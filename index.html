<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Librarian v20 MASTER PRO</title>
    
    <!-- PWA NATIVE FEEL -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HVAC Librarian">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --electric-blue: #00e5ff;
            --emerald-green: #00c853;
            --crimson-red: #ff1744;
            --amber-orange: #ffab00;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass-effect: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            position: relative;
        }

        h2 { font-size: 26px; margin: 10px 0 20px 0; background: linear-gradient(90deg, var(--electric-blue), var(--emerald-green)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

        .btn { width: 100%; padding: 16px; margin: 6px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, background 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background-color: #0056b3; color: white; }
        .btn-stop { background-color: var(--crimson-red); color: white; }
        .btn-orange { background-color: var(--amber-orange); color: black; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-quick { background: linear-gradient(135deg, var(--amber-orange), #ff6d00); color: black; padding: 22px; font-size: 20px; box-shadow: 0 4px 20px rgba(255, 171, 0, 0.2); }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); z-index: 10000; flex-direction:column; padding:12px; box-sizing:border-box; }

        .voice-console { background: var(--glass-effect); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 12px; text-align: center; margin: 4px 0; flex-shrink: 0; position: relative; }

        .big-display { font-size: 110px; line-height: 1; font-weight: 900; color: var(--text-primary); margin: 5px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 30px rgba(255, 255, 255, 0.15); }
        #modalLabel { color: var(--amber-orange); letter-spacing: 2px; font-size: 11px; text-transform: uppercase; font-weight: 900; }
        #targetRange { font-size: 32px; font-weight: 900; color: var(--electric-blue); min-height: 40px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

        .recording-pulse { width: 14px; height: 14px; background: var(--crimson-red); border-radius: 50%; display: none; position: absolute; top: 20px; right: 20px; box-shadow: 0 0 20px var(--crimson-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } 100% { transform: scale(1); opacity: 1; } }

        input { width: 100%; padding: 12px; margin: 4px 0; border-radius: 12px; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 16px; }

        .rig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .spec-cell { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s; }
        .spec-cell.listening { border-color: var(--electric-blue); background: rgba(0, 229, 255, 0.2); transform: scale(1.05); }
        .spec-label { font-size: 10px; color: #777; font-weight: 900; margin-bottom: 4px; }
        .spec-val { font-size: 20px; font-weight: 900; color: var(--text-primary); }

        .dual-inputs { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .cap-cell { display:flex; flex-direction:column; align-items:center; border: 2px solid transparent; border-radius: 12px; padding: 6px; cursor: pointer; width: 80px; }
        .cap-cell.active { border-color: var(--electric-blue); background: rgba(0, 229, 255, 0.1); }
        .cap-cell input { max-width: 60px; text-align: center; background: transparent; font-size: 22px; font-weight: bold; border: none; pointer-events: none; }

        .quick-dial { display: flex; gap: 6px; overflow-x: auto; padding: 10px; margin-top: 5px; background: rgba(0,0,0,0.3); border-radius: 14px; }
        .dial-btn { background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 10px 16px; border-radius: 10px; font-size: 15px; font-weight: 900; }

        .log-list { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 16px; padding: 10px; margin: 6px 0; font-size: 11px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .badge-small { padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 9px; margin-left: 6px; }
        .pass-small { color: var(--emerald-green); border: 1px solid var(--emerald-green); }
        .fail-small { color: var(--crimson-red); border: 1px solid var(--crimson-red); }

        #splashVer { position: absolute; top: 15px; right: 20px; font-size: 12px; color: #fff; font-weight: 900; padding: 5px 12px; background: #333; border-radius: 8px; }
        .tolerance-pill { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; color: #888; }
        .tolerance-pill.active { background: #444; color: var(--electric-blue); border-color: var(--electric-blue); }

        #restoreBox { display: none; background: rgba(0, 229, 255, 0.1); border: 1px dashed var(--electric-blue); padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
        .master-indicator { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: var(--electric-blue); display: none; z-index: 100000; box-shadow: 0 0 15px var(--electric-blue); }

        /* MULTI PHOTO PROGRESS BAR */
        .progress-box { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: var(--electric-blue); transition: width 0.3s; box-shadow: 0 0 10px var(--electric-blue); }

        /* EQUIPMENT CARDS (DEEP LIBRARIAN) */
        .equipment-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-type { font-size: 10px; font-weight: 900; color: var(--amber-orange); text-transform: uppercase; letter-spacing: 1px; }
        .card-model { font-size: 16px; font-weight: 900; color: var(--text-primary); }
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mini-link { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); color: var(--electric-blue); padding: 8px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 700; text-align: center; }
        .mini-link:active { background: rgba(0, 229, 255, 0.2); }

        /* DRAFT REPORT DRAWER */
        .report-drawer { position: fixed; bottom: -80vh; left: 0; width: 100%; height: 80vh; background: var(--bg-dark); border-top: 2px solid var(--electric-blue); z-index: 11000; transition: bottom 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .report-drawer.open { bottom: 0; }
        .drawer-handle { width: 50px; height: 5px; background: #333; border-radius: 10px; margin: -10px auto 15px auto; }
        .drawer-content { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; }
        
        /* FOOTER TAB */
        .report-tab { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #1a1a1a; border-top: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10999; }
        .tab-btn { color: var(--electric-blue); font-weight: 900; font-size: 13px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body id="masterBody">

    <div id="masterIndicator" class="master-indicator"></div>

    <div class="container" id="mainDashboard">
        <div id="splashVer">v20 MASTER PRO</div>
        <h2>HVAC Librarian</h2>

        <!-- UNIT SPECS RIG -->
        <div class="rig-grid">
            <div class="spec-cell" id="spec-RLA" onclick="openSpecVoice('RLA')">
                <span class="spec-label">COMP RLA</span>
                <span id="val-RLA" class="spec-val">--</span>
            </div>
            <div class="spec-cell" id="spec-FLA" onclick="openSpecVoice('FLA')">
                <span class="spec-label">FAN FLA</span>
                <span id="val-FLA" class="spec-val">--</span>
            </div>
            <div class="spec-cell" id="spec-SUB" onclick="openSpecVoice('SUB')">
                <span class="spec-label">TARGET SUB</span>
                <span id="val-SUB" class="spec-val">--</span>
            </div>
            <div class="spec-cell" id="masterSpecBtn" onclick="toggleSpecMaster()" style="background:var(--amber-orange); color:black;">
                <span class="spec-label" style="color:black;">SMART INTAKE</span>
                <span style="font-size:14px; font-weight:900;">⚡ AUTO</span>
            </div>
        </div>

        <div style="margin-bottom:15px;">
            <button onclick="document.getElementById('fileInput').click()" class="btn btn-outline" style="padding:12px; font-size:14px;">📷 BATCH PHOTO TAGS (Multi)</button>
            <input type="file" id="fileInput" style="display:none;" accept="image/*" multiple onchange="handleMultiPhotos(this)">
            <div id="photoProgressBox" class="progress-box"><div id="photoProgressBar" class="progress-bar"></div></div>
            <div id="photoStatus" style="font-size:10px; color:var(--amber-orange); margin-top:5px; text-align:center; display:none;">Processing...</div>
        </div>

        <button class="btn btn-quick" onclick="openVoiceConsole()">⚡ RUN DIAGNOSTIC</button>
        <hr style="opacity:0.1; margin:15px 0;">
        
        <div id="activeJobSection" style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
            <span style="font-size:9px; color:#aaa; font-weight:900; display:block; margin-bottom:5px;">ACTIVE JOB</span>
            <input type="text" id="custName" placeholder="Enter Name / Job #">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-primary" onclick="startJob()" style="flex:2;">CREATE SHELL</button>
                <button class="btn btn-outline" onclick="runLibrarianInApp()" style="flex:1; font-size:10px;">LIBRARIAN</button>
            </div>
            <div id="manualLinks" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- VOICE MODAL -->
    <div id="voiceModal" class="modal-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 id="modalLabel" style="margin:0;">HERM VOLTS</h2>
                <button onclick="clearBuffer()" style="padding:4px 12px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.2); color:red; border-radius:6px; font-size:10px; font-weight:900;">WIPE ALL</button>
            </div>
            <button onclick="closeVoiceModal()" style="background:rgba(255,255,255,0.1); width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); color:white; font-size:20px;">&times;</button>
        </div>

        <div class="voice-console" id="consoleBody">
            <div id="pwrIndicator" class="recording-pulse"></div>
            <div id="targetRange">READY...</div>
            <div id="bigDisplay" class="big-display">0.0</div>
            
            <div class="dual-inputs">
                <div id="hermWrap" class="cap-cell active" onclick="selectRating('herm')">
                    <span style="font-size:9px; color:#aaa; font-weight:bold;">HERM</span>
                    <input type="number" id="hermRating" value="45" readonly>
                </div>
                <span style="font-size:24px; font-weight:bold; color:var(--amber-orange); margin-top:15px;">+</span>
                <div id="fanWrap" class="cap-cell" onclick="selectRating('fan')">
                    <span style="font-size:9px; color:#aaa; font-weight:bold;">FAN</span>
                    <input type="number" id="fanRating" value="5" readonly>
                </div>
                <div id="tolSelector" style="display:flex; flex-direction:column; gap:4px; margin-left:10px;">
                    <div class="tolerance-pill" id="tol5" onclick="setTol(5)">5%</div>
                    <div class="tolerance-pill active" id="tol6" onclick="setTol(6)">6%</div>
                    <div class="tolerance-pill" id="tol10" onclick="setTol(10)">10%</div>
                </div>
            </div>
            
            <div class="quick-dial" id="ratingDial">
                <button class="dial-btn" onclick="dial(3)">3.0</button><button class="dial-btn" onclick="dial(5)">5.0</button><button class="dial-btn" onclick="dial(35)">35</button><button class="dial-btn" onclick="dial(45)">45</button><button class="dial-btn" onclick="dial(50)">50</button>
            </div>

            <div class="control-row" style="margin-top:10px;">
                <button id="micTrigger" class="btn btn-primary" onclick="toggleMic()" style="flex:2;">START MIC</button>
                <button onclick="undoLast()" class="btn btn-orange" style="flex:1; font-size:12px;">UNDO</button>
            </div>
        </div>

        <div id="stagingLog" class="log-list"></div>
        <div id="restoreBox" onclick="restoreBuffer()">↩️ RESTORE WIPED DATA</div>
        
        <button class="btn btn-accent" id="syncBtn" onclick="sendFinalBlock()" style="background: #00e5ff; color:black; margin-top: auto; padding:18px; font-size:18px;">SEAL & SYNC REPORT</button>
    </div>

    <!-- AI TRAY (NON-BLOCKING) -->
    <div id="aiTray" class="modal-overlay" style="background:rgba(0,0,0,0.95); justify-content:flex-end; display:none; height:auto; top:auto; bottom:0; padding:0; border-top:2px solid var(--electric-blue);">
        <div class="container" style="background:#1a1a1a; border-radius: 20px 20px 0 0; border:none; max-width:100%;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="font-size:18px; color:var(--electric-blue); margin:0;">AI TAG RESULTS</h2>
                <button onclick="closeAiModal()" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
            </div>
            <div id="aiResults" style="font-size:14px; max-height:200px; overflow-y:auto; margin:10px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="confirmAiSpecs()" style="font-size:14px; padding:12px;">MERGE & SEARCH MANUALS</button>
                <button class="btn btn-outline" onclick="closeAiModal()" style="font-size:14px; padding:12px;">DISCARD</button>
            </div>
        </div>
    </div>

    <!-- DRAFT REPORT DRAWER -->
    <div id="reportDrawer" class="report-drawer" onclick="if(event.target === this) toggleDrawer()">
        <div class="drawer-handle"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0; font-size:22px;">DRAFT REPORT</h2>
            <button onclick="toggleDrawer()" style="background:none; border:none; color:white; font-size:20px;">READY &times;</button>
        </div>
        <div class="drawer-content" id="drawerContent">
            <!-- Dynamic Content -->
        </div>
        <button class="btn btn-accent" onclick="sendFinalBlock()" style="background:var(--emerald-green); color:black; margin-top:15px; padding:20px; font-size:20px;">SEAL & SYNC REPORT</button>
    </div>

    <!-- FOOTER TAB -->
    <div class="report-tab" id="reportTab">
        <div class="tab-btn" onclick="toggleDrawer()">📋 VIEW DRAFT REPORT</div>
        <div id="tabStatus" style="font-size:11px; color:#666;">EMPTY</div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlH-ta2DPWcVES8Kj49jbD3tWpbqdPm4Of0CAsvD6m1ZlVFhhAH0Fij33mwBP_wv2z/exec";

        let buffer = JSON.parse(localStorage.getItem('hvacStagingBufferV20')) || [];
        let specs = JSON.parse(localStorage.getItem('hvacSpecsV20')) || { RLA: 0, FLA: 0, SUB: 0 };
        let tempAiSpecs = {}; 
        let field = "Herm Volts"; let isCapturing = false; let recognition = null; let masterRec = null; let isMicOn = false; let isMasterOn = false; let forceKill = false; let tolerance = 0.06; let activeRatingTarget = 'herm';

        const FIELD_CYCLE = ["Herm Volts", "Herm Amps", "Fan Volts", "Fan Amps", "Compressor Amps", "Outdoor Fan Amps"];

        initSplash();

        function initSplash() {
            if(specs.RLA) document.getElementById('val-RLA').innerText = specs.RLA;
            if(specs.FLA) document.getElementById('val-FLA').innerText = specs.FLA;
            if(specs.SUB) document.getElementById('val-SUB').innerText = specs.SUB;
        }

        async function handleMultiPhotos(input) {
            const files = input.files; if (files.length === 0) return;
            const status = document.getElementById('photoStatus');
            const pbox = document.getElementById('photoProgressBox');
            const pbar = document.getElementById('photoProgressBar');
            
            status.style.display = 'block'; 
            pbox.style.display = 'block';
            pbar.style.width = '0%';

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    const filename = files[i].name;
                    const mime = files[i].type;
                    
                    status.innerText = `Analyzing: ${filename}...`;
                    pbar.style.width = `${((i + 1) / files.length) * 100}%`;
                    
                    try {
                        const response = await fetch(WEB_APP_URL, {
                            method: "POST",
                            body: JSON.stringify({ action: "uploadPhotoAI", data: base64, filename: filename, mimeType: mime })
                        });
                        const result = await response.json();
                        if(result && result.extractedData) {
                            tempAiSpecs = result.extractedData;
                            openAiModal(result.extractedData);
                        }
                    } catch (err) { console.error(err); }

                    if (i === files.length - 1) {
                        setTimeout(() => { pbox.style.display = 'none'; status.style.display = 'none'; }, 2000);
                    }
                };
                reader.readAsDataURL(files[i]);
            }
        }

        function openAiModal(data) {
            const tray = document.getElementById('aiTray');
            const results = document.getElementById('aiResults');
            tray.style.display = 'flex';
            results.innerHTML = Object.entries(data).map(([k, v]) => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <b style="color:#aaa; font-size:12px;">${k}:</b>
                    <b style="color:var(--electric-blue); font-size:14px;">${v}</b>
                </div>
            `).join('');
        }

        function confirmAiSpecs() {
            if(tempAiSpecs.RLA) specs.RLA = parseFloat(tempAiSpecs.RLA);
            if(tempAiSpecs.FLA) specs.FLA = parseFloat(tempAiSpecs.FLA);
            if(tempAiSpecs.TargetSC) specs.SUB = parseFloat(tempAiSpecs.TargetSC);
            if(tempAiSpecs.Model) {
                // Future: add to persistent equipment list
            }
            localStorage.setItem('hvacSpecsV20', JSON.stringify(specs));
            initSplash();
            syncLogToUI();
            runLibrarianInApp(); // Auto-search after confirmation
            closeAiModal();
        }

        function closeAiModal() { document.getElementById('aiTray').style.display = 'none'; }

        async function runLibrarianInApp() {
            const linksDiv = document.getElementById('manualLinks');
            linksDiv.innerHTML = '<div style="color:var(--amber-orange); text-align:center; padding:10px;">Searching Library...</div>';
            
            try {
                // Sync to sheet first to update the search range
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "runPipeline" }), mode: "no-cors" });
                
                // Fetch the structured results
                const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "fetchManuals" }) });
                const equipment = await response.json();
                
                if(!equipment || equipment.length === 0) {
                    linksDiv.innerHTML = '<div style="color:#666; text-align:center;">No Manuals found for these models.</div>';
                } else {
                    linksDiv.innerHTML = equipment.map(e => `
                        <div class="equipment-card">
                            <div class="card-header">
                                <div>
                                    <div class="card-type">${e.type}</div>
                                    <div class="card-model">${e.model}</div>
                                </div>
                            </div>
                            <div class="link-grid">
                                ${e.links.map(l => `<a href="${l.url}" target="_blank" class="mini-link">${l.text}</a>`).join('')}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                linksDiv.innerHTML = '<div style="color:red; text-align:center;">Search Error. Check Connection.</div>';
            }
        }

        function toggleSpecMaster() {
            if (isMasterOn) { isMasterOn = false; if (masterRec) masterRec.stop(); document.getElementById('masterSpecBtn').style.background = 'var(--amber-orange)'; document.getElementById('masterIndicator').style.display = 'none'; document.querySelectorAll('.spec-cell').forEach(c => c.classList.remove('listening')); return; }
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("Voice not supported.");
            isMasterOn = true; document.getElementById('masterSpecBtn').style.background = 'var(--emerald-green)'; document.getElementById('masterIndicator').style.display = 'block';
            masterRec = new SR(); masterRec.continuous = true; masterRec.interimResults = true;
            masterRec.onresult = (e) => {
                let transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
                let target = null;
                if (transcript.includes("rla")) target = "RLA";
                if (transcript.includes("fla")) target = "FLA";
                if (transcript.includes("sub") || transcript.includes("cool")) target = "SUB";
                if (target) {
                    document.querySelectorAll('.spec-cell').forEach(c => c.classList.remove('listening'));
                    document.getElementById('spec-' + target).classList.add('listening');
                    let num = transcript.replace(/[^0-9.]/g, '');
                    if (num) {
                        specs[target] = parseFloat(num); document.getElementById('val-' + target).innerText = num;
                        localStorage.setItem('hvacSpecsV20', JSON.stringify(specs));
                        const cell = document.getElementById('spec-' + target);
                        cell.style.boxShadow = '0 0 30px var(--emerald-green)';
                        setTimeout(() => cell.style.boxShadow = 'none', 300);
                    }
                }
            };
            masterRec.onend = () => { if (isMasterOn) masterRec.start(); }; masterRec.start();
        }

        function openSpecVoice(target) { toggleSpecMaster(); }

        function openVoiceConsole() { 
            if(isMasterOn) toggleSpecMaster(); 
            document.getElementById('mainDashboard').style.display = 'none';
            document.getElementById('voiceModal').style.display = 'flex';
            syncLogToUI(); recalculateField();
        }

        function setTol(val) { tolerance = val / 100; document.querySelectorAll('.tolerance-pill').forEach(p => p.classList.remove('active')); document.getElementById('tol' + val).classList.add('active'); syncLogToUI(); }

        function selectRating(target) { activeRatingTarget = target; document.getElementById('hermWrap').classList.remove('active'); document.getElementById('fanWrap').classList.remove('active'); document.getElementById(target + 'Wrap').classList.add('active'); }

        function dial(val) { document.getElementById(activeRatingTarget + 'Rating').value = val; recalculateField(); if(buffer.length > 0) syncLogToUI(); }

        function recalculateField() {
            const index = buffer.length % FIELD_CYCLE.length; field = FIELD_CYCLE[index];
            document.getElementById('modalLabel').innerText = field.toUpperCase();
            let lastVolt = 0;
            for(let i = buffer.length-1; i >= 0; i--) { if(buffer[i].field.includes("Volts")) { lastVolt = buffer[i].val; break; } }
            if (field.includes("Amps") && !field.includes("Compressor") && !field.includes("Outdoor")) {
                const rating = parseFloat(document.getElementById(field === "Herm Amps" ? "hermRating" : "fanRating").value);
                if(lastVolt > 0 && rating) {
                    const target = (rating * lastVolt) / 2652;
                    document.getElementById('targetRange').innerText = "RANGE: "+(target*(1-tolerance)).toFixed(2)+" - "+(target*(1+tolerance)).toFixed(2);
                }
            } else { document.getElementById('targetRange').innerText = "READY FOR " + field.toUpperCase(); }
        }

        function syncLogToUI() {
            const log = document.getElementById('stagingLog');
            const drawerContent = document.getElementById('drawerContent');
            const statusLabel = document.getElementById('tabStatus');

            if (buffer.length === 0 && !specs.RLA && !specs.FLA && !specs.SUB) { 
                log.innerHTML = '<div style="color:#444; text-align:center;">Log is empty</div>'; 
                drawerContent.innerHTML = '<div style="color:#666; text-align:center; padding:40px;">No data staged for sync.</div>';
                statusLabel.innerText = "EMPTY";
                return; 
            }

            // Sync Log for Modal
            log.innerHTML = buffer.map((item, idx) => {
                let badge = ""; let details = "";
                if (item.field.includes("Amps") && !item.field.includes("Compressor") && !item.field.includes("Outdoor") && item.volts > 0) {
                    const rating = parseFloat(document.getElementById(item.field === "Herm Amps" ? "hermRating" : "fanRating").value);
                    const uF = (item.val * 2652) / item.volts;
                    const varPct = ((uF / rating) - 1) * 100;
                    const isPass = Math.abs(varPct/100) <= (tolerance + 0.0001);
                    details = ` (${uF.toFixed(2)}µF | ${varPct.toFixed(2)}%)`;
                    badge = `<span class="badge-small ${isPass ? 'pass-small' : 'fail-small'}">${isPass ? 'PASS' : 'FAIL'}</span>`;
                } else if (item.field === "Compressor Amps" && specs.RLA) {
                    const pct = (item.val / specs.RLA) * 100; details = ` (${pct.toFixed(2)}% RLA)`;
                    badge = `<span class="badge-small ${pct <= 100 ? 'pass-small' : 'fail-small'}">${pct <= 100 ? 'PASS' : 'FAIL'}</span>`;
                }
                return `<div class="log-item"><div class="item-text"><b>${item.field}:</b> ${item.val.toFixed(2)}${details}${badge}</div><button class="del-btn" onclick="deleteLogItem(${idx})">UNDO</button></div>`;
            }).join(''); 
            log.scrollTop = log.scrollHeight;

            // Sync Drawer (Draft Report)
            let specHtml = `<div style="margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">
                <h3 style="font-size:12px; color:var(--amber-orange);">UNIT SPECS</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div>RLA: <b>${specs.RLA || '--'}</b></div>
                    <div>FLA: <b>${specs.FLA || '--'}</b></div>
                    <div>Target SC: <b>${specs.SUB || '--'}</b></div>
                </div>
            </div>`;

            let logHtml = `<h3 style="font-size:12px; color:var(--amber-orange);">DIAGNOSTIC LOG</h3>` + 
                buffer.map(i => `<div style="font-size:13px; margin:4px 0;">• ${i.field}: <b>${i.val.toFixed(2)}</b></div>`).join('');

            drawerContent.innerHTML = specHtml + logHtml;
            statusLabel.innerText = `${buffer.length + (specs.RLA?1:0) + (specs.FLA?1:0) + (specs.SUB?1:0)} ITEMS STAGED`;
        }

        function toggleDrawer() { document.getElementById('reportDrawer').classList.toggle('open'); }

        function toggleMic() { if (isMicOn) stopMic(); else startListening(); }

        async function startListening() {
            forceKill = false; const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("Mic not supported.");
            try {
                if (recognition) recognition.stop();
                recognition = new SR(); recognition.continuous = true;
                recognition.onstart = () => { isMicOn = true; document.getElementById('micTrigger').innerText = "STOP MIC"; document.getElementById('pwrIndicator').style.display = "block"; };
                recognition.onresult = (e) => {
                    if (isCapturing) return;
                    let transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
                    if (transcript.includes("copy") || transcript.includes("confirm") || transcript.includes("save")) { confirmReading(); return; }
                    let num = transcript.replace(/[^0-9.]/g, '');
                    if(num && !isCapturing) document.getElementById('bigDisplay').innerText = num;
                };
                recognition.onend = () => { if (isMicOn && !forceKill) recognition.start(); }; recognition.start();
            } catch (e) {}
        }

        function stopMic() { isMicOn = false; forceKill = true; if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; } document.getElementById('micTrigger').innerText = "START MIC"; document.getElementById('pwrIndicator').style.display = "none"; }

        function confirmReading() {
            if (isCapturing) return; let val = parseFloat(document.getElementById('bigDisplay').innerText); if (val === 0) return;
            isCapturing = true; let lastVolt = 0;
            for(let i = buffer.length-1; i >= 0; i--) { if(buffer[i].field.includes("Volts")) { lastVolt = buffer[i].val; break; } }
            buffer.push({ field: field, val: val, volts: lastVolt });
            localStorage.setItem('hvacStagingBufferV20', JSON.stringify(buffer)); syncLogToUI();
            document.getElementById('bigDisplay').style.color = "var(--emerald-green)";
            setTimeout(() => { document.getElementById('bigDisplay').style.color = "var(--text-primary)"; document.getElementById('bigDisplay').innerText = "0.0"; recalculateField(); isCapturing = false; }, 1000);
        }

        function sendFinalBlock() {
            if (buffer.length === 0) return alert("Log empty.");
            stopMic(); document.getElementById('syncBtn').innerText = "SYNCING...";
            let specParts = []; if(specs.RLA) specParts.push(`RLA (Measured) ◘ ${specs.RLA}`); if(specs.FLA) specParts.push(`Fan FLA ◘ ${specs.FLA}`); if(specs.SUB) specParts.push(`Target SC ◘ ${specs.SUB}`);
            let diagParts = buffer.map(item => `${item.field} ◘ ${item.val}`);
            const fullLump = [...specParts, ...diagParts].join(" | ");
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "syncVoice", payload: fullLump }), mode: "no-cors" }).then(() => { alert("Report Sealed!"); buffer = []; localStorage.removeItem('hvacStagingBufferV20'); syncLogToUI(); document.getElementById('syncBtn').innerText = "SEAL & SYNC REPORT"; });
        }

        function closeVoiceModal() { stopMic(); document.getElementById('voiceModal').style.display = 'none'; document.getElementById('mainDashboard').style.display = 'block'; }
        function startJob() { const name = document.getElementById('custName').value; fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "createJob", name: name, date: new Date().toISOString().split('T')[0] }), mode: "no-cors" }).then(() => alert("Job Created.")); }
    </script>
</body>
</html>
