    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Master Pro</title>

    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --electric-blue: #00e5ff;
            --emerald-green: #00c853;
            --crimson-red: #ff1744;
            --amber-orange: #ffab00;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass-effect: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Tightened title */
        h2 {
            font-size: 20px;
            margin: 4px 0 12px 0;
            background: linear-gradient(90deg, var(--electric-blue), var(--emerald-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 5px 0;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: #0056b3;
            color: white;
        }

        .btn-stop {
            background-color: var(--crimson-red);
            color: white;
        }

        .btn-orange {
            background-color: var(--amber-orange);
            color: black;
        }

        .btn-green {
            background-color: var(--emerald-green);
            color: black;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-quick {
            background: linear-gradient(135deg, var(--amber-orange), #ff6d00);
            color: black;
            padding: 20px;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(255, 171, 0, 0.2);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 10000;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }

        /* STEP NAV */
        .step-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 6px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .step-nav::-webkit-scrollbar {
            display: none;
        }

        .step-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #888;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .step-btn.active {
            border-color: var(--electric-blue);
            color: var(--electric-blue);
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .voice-console {
            background: var(--glass-effect);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 10px;
            text-align: center;
            margin: 4px 0;
            flex-shrink: 0;
            position: relative;
        }

        .big-display {
            font-size: 100px;
            line-height: 1;
            font-weight: 900;
            color: var(--text-primary);
            margin: 4px 0;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }

        #modalLabel {
            color: var(--amber-orange);
            letter-spacing: 2px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 900;
        }

        #targetRange {
            font-size: 24px;
            font-weight: 900;
            color: var(--electric-blue);
            min-height: 32px;
            margin-bottom: 4px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .recording-pulse {
            width: 14px;
            height: 14px;
            background: var(--crimson-red);
            border-radius: 50%;
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            box-shadow: 0 0 20px var(--crimson-red);
            animation: pulse 1.5s infinite;
        }
