<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Librarian v14</title>
    
    <!-- PWA NATIVE FEEL META TAGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HVAC Librarian">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --electric-blue: #00e5ff;
            --emerald-green: #00c853;
            --crimson-red: #ff1744;
            --amber-orange: #ffab00;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass-effect: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #mainDashboard { 
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
            position: relative;
        }

        h1, h2 {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--electric-blue), var(--emerald-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin: 5px 0;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #0056b3; color: white; }
        .btn-stop { background-color: var(--crimson-red); color: white; }
        .btn-orange { background-color: var(--amber-orange); color: black; }
        .btn-quick { background-color: var(--amber-orange); color: black; padding: 25px; font-size: 22px; box-shadow: 0 0 20px rgba(255, 171, 0, 0.3); }

        .modal-overlay { 
            display:none; 
            position:fixed; 
            top:0; left:0; width:100%; height:100%; 
            background: var(--bg-dark); 
            z-index: 10000; 
            flex-direction:column; 
            padding:10px; 
            box-sizing:border-box; 
            color: white; 
        }

        .voice-console {
            background: var(--glass-effect);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 15px;
            text-align: center;
            margin: 2px 0;
            flex-shrink: 0;
            position: relative;
        }

        .big-display {
            font-size: 100px; 
            line-height: 1;
            font-weight: 900;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        #modalLabel {
            color: var(--amber-orange);
            letter-spacing: 2px;
            font-size: 10px;
            margin: 0;
            text-transform: uppercase;
        }

        #targetRange {
            font-size: 28px;
            font-weight: 900;
            color: var(--electric-blue);
            min-height: 34px;
            margin: 2px 0;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .recording-pulse {
            width: 14px; height: 14px;
            background: var(--crimson-red);
            border-radius: 50%;
            display: none;
            position: absolute;
            top: 15px; right: 15px;
            box-shadow: 0 0 15px var(--crimson-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-badge {
            display: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 22px;
            margin: 2px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pass { background-color: var(--emerald-green); color: black; display: inline-block; }
        .fail { background-color: var(--crimson-red); color: white; display: inline-block; }

        input { 
            width: 100%; padding: 12px; margin: 4px 0; border-radius: 10px; 
            box-sizing: border-box; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: white; 
            font-size: 16px;
        }

        .dual-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cap-cell { 
            display:flex; flex-direction:column; align-items:center; 
            border: 2px solid transparent; border-radius: 10px; padding: 5px; cursor: pointer;
            transition: background 0.3s, border 0.3s;
        }
        .cap-cell.active { border-color: var(--electric-blue); background: rgba(0, 229, 255, 0.1); }
        
        .cap-cell input {
            max-width: 55px;
            text-align: center;
            padding: 5px;
            background: rgba(255,255,255,0.1);
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            border: none;
        }

        .quick-dial {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 8px 5px;
            margin-top: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .dial-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #eee;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        .dial-btn:active { background: var(--electric-blue); color: black; }

        .log-list {
            flex: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin: 5px 0;
            padding: 8px;
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .del-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,68,68,0.4);
            color: #ff6666;
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 9px;
        }
        
        #manualInputZone {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 1000;
            padding: 20px;
            border-radius: 20px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .control-row {
            display: flex;
            gap: 8px;
            margin: 2px 0;
            width: 100%;
        }
        .control-row .btn { flex: 1; margin: 0; padding: 14px; font-size: 16px; }

        .ver-tag { position: absolute; bottom: 5px; left: 10px; font-size: 9px; color: #444; }
        
        .tolerance-pill { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; 
            padding: 6px 10px; border-radius: 15px; font-size: 11px; 
            cursor: pointer; color: var(--text-secondary);
            font-weight: bold;
        }
        .tolerance-pill.active { background: #444; color: var(--electric-blue); border-color: var(--electric-blue); }
        
        #splashVer {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 12px; color: #fff;
            font-weight: 900;
            padding: 5px 10px;
            background: #444;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body id="masterBody">
    <div class="container" id="mainDashboard">
        <div id="splashVer">v14 FULL</div>
        <h2>HVAC Librarian</h2>
        <button class="btn btn-quick" onclick="openVoiceConsole()">⚡ SYSTEM DIAGNOSTIC</button>
        <hr style="opacity:0.1; margin:20px 0;">
        <input type="text" id="custName" placeholder="Customer Name">
        <button class="btn btn-primary" onclick="startJob()">1. Create Job Shell</button>
        <div id="pipelineSection" style="display:none;">
            <button class="btn btn-quick" onclick="runPipeline()">2. Run Pipeline</button>
        </div>
    </div>

    <div id="voiceModal" class="modal-overlay state-idle">
        <!-- HEADER -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 id="modalLabel" style="margin:0;">HERM VOLTS</h2>
                <button onclick="clearBuffer()" style="padding:4px 12px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.2); color:red; border-radius:6px; font-size:10px; font-weight:900;">WIPE ALL</button>
            </div>
            <button onclick="closeVoiceModal()" style="background:rgba(255,255,255,0.1); width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); color:white; font-size:20px;">&times;</button>
        </div>

        <!-- MAIN CONSOLE -->
        <div class="voice-console" id="consoleBody">
            <div id="pwrIndicator" class="recording-pulse"></div>
            <div id="targetRange">READY...</div>
            <div id="bigDisplay" class="big-display">0.0</div>
            
            <div id="passFailBadge" class="result-badge">---</div>

            <!-- MANUAL OVERLAY -->
            <div id="manualInputZone">
                <h3 style="margin:0 0 10px 0;">NUMERIC ENTRY</h3>
                <input type="number" id="manualValue" placeholder="0.00" style="font-size:40px; text-align:center; height:80px;">
                <div class="control-row" style="margin-top:20px;">
                    <button onclick="saveManual()" class="btn btn-primary">SAVE</button>
                    <button onclick="toggleManual(false)" class="btn" style="background:#222;">BACK</button>
                </div>
            </div>

            <!-- DUAL INPUTS & TOLERANCE -->
            <div style="display:flex; flex-direction:column; gap:4px;">
                <div class="dual-inputs">
                    <div id="hermWrap" class="cap-cell active" onclick="selectRating('herm')">
                        <span style="font-size:9px; color:#aaa; font-weight:bold;">HERM</span>
                        <input type="number" id="hermRating" value="45" readonly>
                    </div>
                    <span style="font-size:24px; font-weight:bold; color:var(--amber-orange); margin-top:20px;">+</span>
                    <div id="fanWrap" class="cap-cell" onclick="selectRating('fan')">
                        <span style="font-size:9px; color:#aaa; font-weight:bold;">FAN</span>
                        <input type="number" id="fanRating" value="5" readonly>
                    </div>
                    <div id="tolSelector" style="display:flex; flex-direction:column; gap:4px; margin-left:10px;">
                        <div class="tolerance-pill" id="tol5" onclick="setTol(5)">5%</div>
                        <div class="tolerance-pill active" id="tol6" onclick="setTol(6)">6%</div>
                        <div class="tolerance-pill" id="tol10" onclick="setTol(10)">10%</div>
                    </div>
                </div>
                
                <!-- COMPREHENSIVE QUICK DIAL -->
                <div class="quick-dial" id="ratingDial">
                    <button class="dial-btn" onclick="dial(3)">3.0</button>
                    <button class="dial-btn" onclick="dial(4)">4.0</button>
                    <button class="dial-btn" onclick="dial(5)">5.0</button>
                    <button class="dial-btn" onclick="dial(7.5)">7.5</button>
                    <button class="dial-btn" onclick="dial(10)">10</button>
                    <button class="dial-btn" onclick="dial(25)">25</button>
                    <button class="dial-btn" onclick="dial(30)">30</button>
                    <button class="dial-btn" onclick="dial(35)">35</button>
                    <button class="dial-btn" onclick="dial(40)">40</button>
                    <button class="dial-btn" onclick="dial(45)">45</button>
                    <button class="dial-btn" onclick="dial(50)">50</button>
                    <button class="dial-btn" onclick="dial(55)">55</button>
                    <button class="dial-btn" onclick="dial(60)">60</button>
                    <button class="dial-btn" onclick="dial(70)">70</button>
                    <button class="dial-btn" onclick="dial(80)">80</button>
                </div>
            </div>

            <div class="control-row" style="margin-top:10px;">
                <button id="micTrigger" class="btn btn-primary" onclick="toggleMic()" style="flex:2;">START MIC</button>
                <button onclick="toggleManual(true)" class="btn btn-orange" style="flex:1; font-size:14px;">MANUAL</button>
            </div>
            <div class="ver-tag">DIAGNOSTIC ENGINE v14.0</div>
        </div>

        <!-- SECONDARY ACTIONS -->
        <div class="control-row">
            <button onclick="deleteLogItem(buffer.length-1)" style="background:rgba(255,23,68,0.1); border: 1px solid var(--crimson-red); color: var(--crimson-red); font-size:15px;" class="btn">UNDO / SCRUB</button>
            <button onclick="confirmReading()" style="background:rgba(0,200,83,0.1); border: 1px solid var(--emerald-green); color: var(--emerald-green); font-size:15px;" class="btn">COPY / CONFIRM</button>
        </div>

        <!-- STAGING LOG -->
        <div id="stagingLog" class="log-list"></div>
        
        <button class="btn btn-accent" id="syncBtn" onclick="sendFinalBlock()" style="background: #00e5ff; color:black; margin-top: auto; padding:15px; font-size:18px;">SEAL & SYNC DATA</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxwJaPVJanB9eii0RXcYumvLAo6sgvwTG3OumYsHmams9apkn1wVcfvkzAx2knBseXE/exec";

        let buffer = JSON.parse(localStorage.getItem('hvacStagingBuffer')) || [];
        let field = "Herm Volts"; 
        let currentVolts = 0;
        let isCapturing = false; 
        let recognition = null;
        let isMicOn = false;
        let tolerance = 0.06;
        let activeRatingTarget = 'herm';

        // EXTENDED CYCLE v14
        const FIELD_CYCLE = [
            "Herm Volts", "Herm Amps", 
            "Fan Volts", "Fan Amps",
            "Compressor Amps", "Outdoor Fan Amps"
        ];

        syncLogToUI();
        recalculateField();

        function selectRating(target) {
            activeRatingTarget = target;
            document.getElementById('hermWrap').classList.remove('active');
            document.getElementById('fanWrap').classList.remove('active');
            document.getElementById(target + 'Wrap').classList.add('active');
        }

        function dial(val) {
            document.getElementById(activeRatingTarget + 'Rating').value = val;
            recalculateField();
            const wrap = document.getElementById(activeRatingTarget + 'Wrap');
            wrap.style.background = 'rgba(0, 229, 255, 0.4)';
            setTimeout(() => wrap.style.background = 'rgba(0, 229, 255, 0.1)', 200);
        }

        function setTol(val) {
            tolerance = val / 100;
            document.querySelectorAll('.tolerance-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('tol' + val).classList.add('active');
            recalculateField();
        }

        function toggleManual(show) {
            const zone = document.getElementById('manualInputZone');
            zone.style.display = show ? 'flex' : 'none';
            if(show) {
                stopMic();
                document.getElementById('manualValue').focus();
            }
        }

        function saveManual() {
            const val = document.getElementById('manualValue').value;
            if(!val) return;
            document.getElementById('bigDisplay').innerText = val;
            confirmReading();
            document.getElementById('manualValue').value = "";
            toggleManual(false);
        }

        function recalculateField() {
            const index = buffer.length % FIELD_CYCLE.length;
            field = FIELD_CYCLE[index];
            
            document.getElementById('modalLabel').innerText = field.toUpperCase();
            
            // IF WE ARE IN THE "POST-COPY" PHASE (result visible)
            // WE RE-EVALUATE THE BADGE BASED ON CURRENT INPUTS
            const badge = document.getElementById('passFailBadge');
            const display = document.getElementById('bigDisplay');
            const val = display.innerText;

            if (field.includes("Amps") && val !== "0.0") {
                // If we have a value on screen, it means we are in the "Confirm and Pulse" phase or just loaded
                // Actually, recalculateField is called AFTER push. So display is usually "0.0" here or Cycle Complete.
            }

            // FIND LAST VOLTS FOR PREDICTION
            let lastVolt = 0;
            for(let i = buffer.length-1; i >= 0; i--) {
                if(buffer[i].includes("Volts")) {
                    lastVolt = parseFloat(buffer[i].split("◘")[1]);
                    break;
                }
            }
            currentVolts = lastVolt;

            if (field.includes("Amps") && !field.includes("Compressor") && !field.includes("Outdoor")) {
                const ratingId = field === "Herm Amps" ? "hermRating" : "fanRating";
                const rating = parseFloat(document.getElementById(ratingId).value);
                if(currentVolts > 0 && rating) {
                    const target = (rating * currentVolts) / 2652;
                    const min = (target * (1 - tolerance)).toFixed(2);
                    const max = (target * (1 + tolerance)).toFixed(2);
                    document.getElementById('targetRange').innerText = "RANGE: " + min + " - " + max;
                }
            } else {
                document.getElementById('targetRange').innerText = "READY FOR " + field.toUpperCase();
                badge.style.display = "none";
            }
        }

        function deleteLogItem(index) {
            if(index < 0) return;
            buffer.splice(index, 1);
            localStorage.setItem('hvacStagingBuffer', JSON.stringify(buffer));
            syncLogToUI();
            recalculateField();
        }

        function clearBuffer() {
            if(!confirm("WIPE ALL READINGS?")) return;
            buffer = [];
            localStorage.removeItem('hvacStagingBuffer');
            syncLogToUI();
            recalculateField();
        }

        function syncLogToUI() {
            const log = document.getElementById('stagingLog');
            if (buffer.length === 0) {
                log.innerHTML = '<div style="color:#444; text-align:center; height:60px; display:flex; align-items:center; justify-content:center;">Log is empty</div>';
                document.getElementById('voiceModal').className = 'modal-overlay state-idle';
                return;
            }
            log.innerHTML = buffer.map((item, idx) => `
                <div class="log-item">
                    <span>${item.replace('◘', ': ')}</span>
                    <button class="del-btn" onclick="deleteLogItem(${idx})">UNDO</button>
                </div>
            `).join('');
            log.scrollTop = log.scrollHeight;
            document.getElementById('voiceModal').className = 'modal-overlay state-pending';
        }

        function openVoiceConsole() { 
            document.getElementById('mainDashboard').style.display = 'none';
            document.getElementById('voiceModal').style.display = 'flex';
            syncLogToUI();
            recalculateField();
        }

        function toggleMic() {
            if (isMicOn) stopMic();
            else startListening();
        }

        async function startListening() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("Mic not supported.");
            try {
                if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
                recognition = new SR();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.onstart = () => {
                    isMicOn = true;
                    document.getElementById('targetRange').innerText = "🎤 LISTENING...";
                    document.getElementById('micTrigger').innerText = "STOP MIC";
                    document.getElementById('micTrigger').className = "btn btn-stop";
                    document.getElementById('pwrIndicator').style.display = "block";
                };
                recognition.onresult = (e) => {
                    if (isCapturing) return;
                    let result = e.results[e.results.length-1];
                    let transcript = result[0].transcript.toLowerCase();
                    if (transcript.includes("copy") || transcript.includes("confirm") || transcript.includes("yes") || transcript.includes("save")) { confirmReading(); return; }
                    if (transcript.includes("scrub") || transcript.includes("reject") || transcript.includes("delete") || transcript.includes("undo")) { deleteLogItem(buffer.length - 1); return; }
                    let num = transcript.replace(/[^0-9.]/g, '');
                    if(num && !isCapturing) document.getElementById('bigDisplay').innerText = num;
                };
                recognition.onend = () => { if (isMicOn) try { recognition.start(); } catch(e){} };
                recognition.start();
            } catch (e) { alert("Mic Access Failed."); }
        }

        function stopMic() {
            isMicOn = false;
            if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
            document.getElementById('micTrigger').innerText = "START MIC";
            document.getElementById('micTrigger').className = "btn btn-primary";
            document.getElementById('pwrIndicator').style.display = "none";
        }

        function confirmReading() {
            if (isCapturing) return;
            let val = document.getElementById('bigDisplay').innerText;
            if (val === "0.0") return;

            isCapturing = true; 
            const badge = document.getElementById('passFailBadge');
            badge.style.display = "none";

            let resultExtra = "";
            
            // MATH v14
            if (field.includes("Amps") && !field.includes("Compressor") && !field.includes("Outdoor") && currentVolts > 0) {
                const measuredAmps = parseFloat(val);
                const ratingId = (field === "Herm Amps") ? "hermRating" : "fanRating";
                const rating = parseFloat(document.getElementById(ratingId).value);
                
                const measuredUF = (measuredAmps * 2652) / currentVolts;
                const variance = ((measuredUF / rating) - 1) * 100;
                const isPass = Math.abs(variance/100) <= (tolerance + 0.0001); 
                
                badge.innerText = isPass ? "PASS" : "FAIL";
                badge.className = "result-badge " + (isPass ? "pass" : "fail");
                badge.style.display = "inline-block";
                
                resultExtra = ` (${measuredUF.toFixed(1)}µF | ${variance > 0 ? "+" : ""}${variance.toFixed(1)}%) [${badge.innerText}]`;
            }

            buffer.push(field + " ◘ " + val + resultExtra);
            localStorage.setItem('hvacStagingBuffer', JSON.stringify(buffer));
            syncLogToUI();
            
            const display = document.getElementById('bigDisplay');
            display.style.color = "var(--emerald-green)";
            
            setTimeout(() => {
                display.style.color = "var(--text-primary)";
                display.innerText = "0.0";
                recalculateField(); 
                isCapturing = false;
                if (buffer.length % FIELD_CYCLE.length === 0) {
                    document.getElementById('targetRange').innerText = "DIAGNOSTIC COMPLETE";
                    stopMic();
                }
            }, 1000);
        }

        function sendFinalBlock() {
            if (buffer.length === 0) return alert("Log is empty.");
            stopMic();
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = true;
            syncBtn.innerText = "SYNCING...";
            const lump = buffer.join(" | ");
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "syncVoice", payload: lump }), mode: "no-cors" })
            .then(() => {
                document.getElementById('voiceModal').className = 'modal-overlay state-success';
                setTimeout(() => {
                    buffer = []; localStorage.removeItem('hvacStagingBuffer');
                    syncLogToUI(); syncBtn.disabled = false; syncBtn.innerText = "SEAL & SYNC DATA";
                    alert("Sync Success!"); recalculateField();
                }, 1500);
            })
            .catch(() => {
                document.getElementById('voiceModal').className = 'modal-overlay state-conflict';
                syncBtn.disabled = false; syncBtn.innerText = "RETRY";
            });
        }

        function closeVoiceModal() { stopMic(); document.getElementById('voiceModal').style.display = 'none'; document.getElementById('mainDashboard').style.display = 'block'; }
        function startJob() { 
            const name = document.getElementById('custName').value;
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "createJob", name: name }), mode: "no-cors" })
            .then(() => { document.getElementById('pipelineSection').style.display='block'; alert("Job Queued."); });
        }
        function runPipeline() { fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "runPipeline" }), mode: "no-cors" }).then(() => alert("Pipeline Triggered.")); }
    </script>
</body>
</html>
