<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Master Librarian</title>
    
    <!-- PWA NATIVE FEEL META TAGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HVAC Librarian">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --electric-blue: #00e5ff;
            --emerald-green: #00c853;
            --crimson-red: #ff1744;
            --amber-orange: #ffab00;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass-effect: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #mainDashboard { 
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--electric-blue), var(--emerald-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #0056b3; color: white; }
        .btn-stop { background-color: var(--crimson-red); color: white; }
        .btn-quick { background-color: var(--amber-orange); color: black; padding: 25px; font-size: 22px; box-shadow: 0 0 20px rgba(255, 171, 0, 0.3); }

        .modal-overlay { 
            display:none; 
            position:fixed; 
            top:0; left:0; width:100%; height:100%; 
            background: var(--bg-dark); 
            z-index:10000; 
            flex-direction:column; 
            padding:20px; 
            box-sizing:border-box; 
            color: white; 
            transition: background 0.5s ease;
        }

        .voice-console {
            background: var(--glass-effect);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px 20px;
            text-align: center;
            margin: 10px 0;
            transition: background 0.3s ease;
            position: relative;
        }

        .big-display {
            font-size: 100px; 
            line-height: 1;
            font-weight: 900;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        #modalLabel {
            color: var(--amber-orange);
            letter-spacing: 4px;
            font-size: 14px;
            margin: 0;
            text-transform: uppercase;
        }

        #targetRange {
            font-size: 20px;
            font-weight: 700;
            color: var(--electric-blue);
            min-height: 30px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .recording-pulse {
            width: 12px; height: 12px;
            background: var(--crimson-red);
            border-radius: 50%;
            display: none;
            position: absolute;
            top: 15px; right: 15px;
            box-shadow: 0 0 10px var(--crimson-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-badge {
            display: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 24px;
            margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .pass { background-color: var(--emerald-green); color: black; display: inline-block; }
        .fail { background-color: var(--crimson-red); color: white; display: inline-block; }

        input { 
            width: 100%; padding: 15px; margin: 5px 0; border-radius: 12px; 
            box-sizing: border-box; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: white; 
            font-size: 16px;
        }

        .dual-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }
        .dual-inputs input {
            max-width: 80px;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .del-btn {
            background: rgba(255,0,0,0.2);
            border: none;
            color: #ff5555;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        #manualInputZone {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 10;
            padding: 40px 20px;
            border-radius: 20px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="container" id="mainDashboard">
        <h2>HVAC Librarian</h2>
        <button class="btn btn-quick" onclick="openVoiceConsole()">⚡ CAPACITOR TEST</button>
        <hr style="opacity:0.1; margin:20px 0;">
        <input type="text" id="custName" placeholder="Customer Name">
        <button class="btn btn-primary" onclick="startJob()">1. Create Job Shell</button>
        <div id="pipelineSection" style="display:none;">
            <button class="btn btn-quick" onclick="runPipeline()">2. Run Pipeline</button>
        </div>
    </div>

    <div id="voiceModal" class="modal-overlay state-idle">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 id="modalLabel" style="margin:0;">HERM VOLTS</h2>
            </div>
            <button onclick="closeVoiceModal()" style="background:rgba(255,255,255,0.1); width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer;">&times;</button>
        </div>

        <div class="voice-console" id="consoleBody">
            <div id="pwrIndicator" class="recording-pulse"></div>
            <div id="targetRange">READY FOR VOLTS</div>
            <div id="bigDisplay" class="big-display">0.0</div>
            
            <div id="passFailBadge" class="result-badge">---</div>

            <!-- MANUAL OVERLAY -->
            <div id="manualInputZone">
                <h3 style="margin:0 0 15px 0;">MANUAL ENTRY</h3>
                <input type="number" id="manualValue" placeholder="Enter Value" style="font-size:32px; text-align:center;">
                <div style="display:flex; gap:10px; width:100%; margin-top:20px;">
                    <button onclick="saveManual()" class="btn btn-primary" style="flex:1;">SAVE</button>
                    <button onclick="toggleManual(false)" class="btn" style="flex:1; background:rgba(255,255,255,0.1);">CANCEL</button>
                </div>
            </div>

            <div id="capConfig" style="margin-top: 10px;">
                <div class="dual-inputs">
                    <input type="number" id="hermRating" value="45" placeholder="Herm">
                    <span style="font-size:24px; font-weight:bold; color:var(--amber-orange);">+</span>
                    <input type="number" id="fanRating" value="5" placeholder="Fan">
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="micTrigger" class="btn btn-primary" onclick="toggleMic()" style="flex:2; padding:12px;">START MIC</button>
                <button onclick="toggleManual(true)" class="btn" style="flex:1; background:rgba(255,255,255,0.05); font-size:12px; padding:12px;">MANUAL</button>
            </div>
        </div>

        <div style="display:flex; height:60px; gap:15px;">
            <button onclick="scrubDisplay()" style="background:rgba(255,23,68,0.1); border: 1px solid var(--crimson-red); color: var(--crimson-red); flex:1;" class="btn">SCRUB</button>
            <button onclick="confirmReading()" style="background:rgba(0,200,83,0.1); border: 1px solid var(--emerald-green); color: var(--emerald-green); flex:1;" class="btn">COPY</button>
        </div>

        <div id="stagingLog" style="flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius: 12px; margin-top:10px; padding:15px; font-size:14px; border: 1px solid rgba(255,255,255,0.05);"></div>
        
        <button class="btn btn-accent" id="syncBtn" onclick="sendFinalBlock()" style="background: #00e5ff; color:black; margin-top: 10px;">SEAL & SYNC DATA</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxwJaPVJanB9eii0RXcYumvLAo6sgvwTG3OumYsHmams9apkn1wVcfvkzAx2knBseXE/exec";

        let buffer = JSON.parse(localStorage.getItem('hvacStagingBuffer')) || [];
        let field = "Herm Volts"; 
        let currentVolts = 0;
        let expectedRange = null;
        let isCapturing = false; 
        let recognition = null;
        let isMicOn = false;

        const FIELD_CYCLE = ["Herm Volts", "Herm Amps", "Fan Volts", "Fan Amps"];

        syncLogToUI();
        recalculateField();

        function updateUIState(state) {
            document.getElementById('voiceModal').className = 'modal-overlay ' + state;
        }

        function toggleManual(show) {
            const zone = document.getElementById('manualInputZone');
            zone.style.display = show ? 'flex' : 'none';
            if(show) {
                stopMic();
                document.getElementById('manualValue').focus();
            }
        }

        function saveManual() {
            const val = document.getElementById('manualValue').value;
            if(!val) return;
            document.getElementById('bigDisplay').innerText = val;
            confirmReading();
            document.getElementById('manualValue').value = "";
            toggleManual(false);
        }

        function recalculateField() {
            // Determine field based on buffer length
            const index = buffer.length % FIELD_CYCLE.length;
            field = FIELD_CYCLE[index];
            
            document.getElementById('modalLabel').innerText = field.toUpperCase();
            document.getElementById('bigDisplay').innerText = "0.0";
            document.getElementById('passFailBadge').style.display = "none";
            
            // Logic for predictions when rewinding
            if (field.includes("Amps")) {
                // Find previous volts in buffer
                const lastEntry = buffer[buffer.length-1]; // This is wrong if we just stepped back
                // Let's search the buffer for the LAST volt reading
                let lastVolt = 0;
                for(let i = buffer.length-1; i >= 0; i--) {
                    if(buffer[i].includes("Volts")) {
                        lastVolt = parseFloat(buffer[i].split("◘")[1]);
                        break;
                    }
                }
                currentVolts = lastVolt;
                const ratingId = field === "Herm Amps" ? "hermRating" : "fanRating";
                const rating = parseFloat(document.getElementById(ratingId).value);
                if(currentVolts > 0 && rating) {
                    expectedRange = calculateExpectedAmps(currentVolts, rating);
                    document.getElementById('targetRange').innerText = "EXPECTED: " + expectedRange.min + " - " + expectedRange.max;
                    document.getElementById('targetRange').style.color = "var(--amber-orange)";
                }
            } else {
                document.getElementById('targetRange').innerText = "READY FOR " + field.toUpperCase();
                document.getElementById('targetRange').style.color = "var(--electric-blue)";
                expectedRange = null;
            }
        }

        function deleteLogItem(index) {
            buffer.splice(index, 1);
            localStorage.setItem('hvacStagingBuffer', JSON.stringify(buffer));
            syncLogToUI();
            recalculateField();
        }

        function clearBuffer() {
            if(confirm("Wipe the staging log?")) {
                buffer = [];
                localStorage.removeItem('hvacStagingBuffer');
                syncLogToUI();
                recalculateField();
            }
        }

        function syncLogToUI() {
            const log = document.getElementById('stagingLog');
            if (buffer.length === 0) {
                log.innerHTML = '<div style="color:#444; text-align:center; margin-top:10px;">Log is empty</div>';
                updateUIState('state-idle');
                return;
            }
            
            log.innerHTML = buffer.map((item, idx) => `
                <div class="log-item">
                    <span>${item.replace('◘', ': ')}</span>
                    <button class="del-btn" onclick="deleteLogItem(${idx})">UNDO</button>
                </div>
            `).join('');
            log.scrollTop = log.scrollHeight;
            updateUIState('state-pending');
        }

        function openVoiceConsole() { 
            document.getElementById('mainDashboard').style.display = 'none';
            document.getElementById('voiceModal').style.display = 'flex';
            syncLogToUI();
            recalculateField();
        }

        function calculateExpectedAmps(volts, rating) {
            if (!volts || !rating) return null;
            const target = (rating * volts) / 2652;
            return {
                target: target.toFixed(2),
                min: (target * 0.94).toFixed(2),
                max: (target * 1.06).toFixed(2)
            };
        }

        function toggleMic() {
            if (isMicOn) stopMic();
            else startListening();
        }

        async function startListening() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("Mic not supported.");
            
            try {
                if (recognition) recognition.stop();
                
                recognition = new SR();
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onstart = () => {
                    isMicOn = true;
                    document.getElementById('targetRange').innerText = "🎤 LISTENING...";
                    document.getElementById('micTrigger').innerText = "STOP MIC";
                    document.getElementById('micTrigger').className = "btn btn-stop";
                    document.getElementById('pwrIndicator').style.display = "block";
                };

                recognition.onresult = (e) => {
                    if (isCapturing) return;

                    let result = e.results[e.results.length-1];
                    let transcript = result[0].transcript.toLowerCase();
                    
                    if (transcript.includes("copy") || transcript.includes("confirm") || transcript.includes("yes") || transcript.includes("save")) { 
                        confirmReading(); 
                        return; 
                    }
                    
                    let num = transcript.replace(/[^0-9.]/g, '');
                    if(num && !isCapturing) {
                        document.getElementById('bigDisplay').innerText = num;
                    }
                };

                recognition.onend = () => {
                    if (isMicOn) try { recognition.start(); } catch(e){}
                };

                recognition.onerror = (e) => {
                    console.log("Mic Error:", e.error);
                };

                recognition.start();
            } catch (e) {
                alert("Mic Access Failed: " + e.name);
            }
        }

        function stopMic() {
            isMicOn = false;
            if (recognition) {
                recognition.onend = null;
                recognition.stop();
            }
            document.getElementById('micTrigger').innerText = "START MIC";
            document.getElementById('micTrigger').className = "btn btn-primary";
            document.getElementById('pwrIndicator').style.display = "none";
        }

        function scrubDisplay() {
            document.getElementById('bigDisplay').innerText = "0.0";
            document.getElementById('passFailBadge').style.display = "none";
        }

        function confirmReading() {
            if (isCapturing) return;
            let val = document.getElementById('bigDisplay').innerText;
            if (val === "0.0") return;

            isCapturing = true; 
            const badge = document.getElementById('passFailBadge');
            badge.style.display = "none";

            // PASS/FAIL CHECK
            if (field.includes("Amps") && expectedRange) {
                const measured = parseFloat(val);
                if (measured >= parseFloat(expectedRange.min) && measured <= parseFloat(expectedRange.max)) {
                    badge.innerText = "PASS";
                    badge.className = "result-badge pass";
                } else {
                    badge.innerText = "FAIL";
                    badge.className = "result-badge fail";
                }
                badge.style.display = "inline-block";
            }

            buffer.push(field + " ◘ " + val + (badge.style.display === 'inline-block' ? " [" + badge.innerText + "]" : ""));
            localStorage.setItem('hvacStagingBuffer', JSON.stringify(buffer));
            syncLogToUI();
            
            const display = document.getElementById('bigDisplay');
            display.style.color = "var(--emerald-green)";
            
            setTimeout(() => {
                display.style.color = "var(--text-primary)";
                recalculateField(); 
                isCapturing = false;
            }, 1000);
        }

        function sendFinalBlock() {
            if (buffer.length === 0) return alert("No data to sync.");
            stopMic();
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = true;
            syncBtn.innerText = "SYNCING...";

            const lump = buffer.join(" | ");
            
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "syncVoice", payload: lump }),
                mode: "no-cors"
            })
            .then(() => {
                updateUIState('state-success');
                setTimeout(() => {
                    buffer = [];
                    localStorage.removeItem('hvacStagingBuffer');
                    syncLogToUI();
                    updateUIState('state-idle');
                    syncBtn.disabled = false;
                    syncBtn.innerText = "SEAL & SYNC DATA";
                    alert("Sync Success! Spreadsheet Updated.");
                    recalculateField();
                }, 1500);
            })
            .catch(() => {
                updateUIState('state-conflict');
                syncBtn.disabled = false;
                syncBtn.innerText = "RETRY";
            });
        }

        function closeVoiceModal() { 
            stopMic();
            document.getElementById('voiceModal').style.display = 'none'; 
            document.getElementById('mainDashboard').style.display = 'block';
        }

        function startJob() { 
            const name = document.getElementById('custName').value;
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "createJob", name: name }), mode: "no-cors" })
            .then(() => { document.getElementById('pipelineSection').style.display='block'; alert("Job Queued."); });
        }

        function runPipeline() { 
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "runPipeline" }), mode: "no-cors" })
            .then(() => alert("Pipeline Triggered."));
        }
    </script>
</body>
</html>
