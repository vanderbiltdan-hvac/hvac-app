<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Librarian v20 MASTER PRO</title>
    
    <!-- PWA NATIVE FEEL -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HVAC Librarian">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --electric-blue: #00e5ff;
            --emerald-green: #00c853;
            --crimson-red: #ff1744;
            --amber-orange: #ffab00;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass-effect: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            position: relative;
        }

        h2 { font-size: 26px; margin: 10px 0 20px 0; background: linear-gradient(90deg, var(--electric-blue), var(--emerald-green)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

        .btn { width: 100%; padding: 16px; margin: 6px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, background 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background-color: #0056b3; color: white; }
        .btn-stop { background-color: var(--crimson-red); color: white; }
        .btn-orange { background-color: var(--amber-orange); color: black; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-quick { background: linear-gradient(135deg, var(--amber-orange), #ff6d00); color: black; padding: 22px; font-size: 20px; box-shadow: 0 4px 20px rgba(255, 171, 0, 0.2); }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); z-index: 10000; flex-direction:column; padding:12px; box-sizing:border-box; }

        .voice-console { background: var(--glass-effect); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 12px; text-align: center; margin: 4px 0; flex-shrink: 0; position: relative; }

        .big-display { font-size: 110px; line-height: 1; font-weight: 900; color: var(--text-primary); margin: 5px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 30px rgba(255, 255, 255, 0.15); }
        #modalLabel { color: var(--amber-orange); letter-spacing: 2px; font-size: 11px; text-transform: uppercase; font-weight: 900; }
        #targetRange { font-size: 32px; font-weight: 900; color: var(--electric-blue); min-height: 40px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

        .recording-pulse { width: 14px; height: 14px; background: var(--crimson-red); border-radius: 50%; display: none; position: absolute; top: 20px; right: 20px; box-shadow: 0 0 20px var(--crimson-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } 100% { transform: scale(1); opacity: 1; } }

        input { width: 100%; padding: 12px; margin: 4px 0; border-radius: 12px; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 16px; }

        .rig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .spec-cell { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s; }
        .spec-cell.listening { border-color: var(--electric-blue); background: rgba(0, 229, 255, 0.2); transform: scale(1.05); }
        .spec-label { font-size: 10px; color: #777; font-weight: 900; margin-bottom: 4px; }
        .spec-val { font-size: 20px; font-weight: 900; color: var(--text-primary); }

        .dual-inputs { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .cap-cell { display:flex; flex-direction:column; align-items:center; border: 2px solid transparent; border-radius: 12px; padding: 6px; cursor: pointer; width: 80px; }
        .cap-cell.active { border-color: var(--electric-blue); background: rgba(0, 229, 255, 0.1); }
        .cap-cell input { max-width: 60px; text-align: center; background: transparent; font-size: 22px; font-weight: bold; border: none; pointer-events: none; }

        .quick-dial { display: flex; gap: 6px; overflow-x: auto; padding: 10px; margin-top: 5px; background: rgba(0,0,0,0.3); border-radius: 14px; }
        .dial-btn { background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 10px 16px; border-radius: 10px; font-size: 15px; font-weight: 900; }

        .log-list { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 16px; padding: 10px; margin: 6px 0; font-size: 11px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .badge-small { padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 9px; margin-left: 6px; }
        .pass-small { color: var(--emerald-green); border: 1px solid var(--emerald-green); }
        .fail-small { color: var(--crimson-red); border: 1px solid var(--crimson-red); }

        #splashVer { position: absolute; top: 15px; right: 20px; font-size: 12px; color: #fff; font-weight: 900; padding: 5px 12px; background: #333; border-radius: 8px; }
        .tolerance-pill { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; color: #888; }
        .tolerance-pill.active { background: #444; color: var(--electric-blue); border-color: var(--electric-blue); }

        #restoreBox { display: none; background: rgba(0, 229, 255, 0.1); border: 1px dashed var(--electric-blue); padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
        .master-indicator { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: var(--electric-blue); display: none; z-index: 100000; box-shadow: 0 0 15px var(--electric-blue); }

        /* v22 DASHBOARD & NAVBAR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0b0b0b; border-top: 1px solid #1a1a1a; display: grid; grid-template-columns: repeat(4, 1fr); z-index: 10000; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; cursor: pointer; transition: 0.3s; padding-bottom: 5px; }
        .nav-item.active { color: var(--electric-blue); border-top: 2px solid var(--electric-blue); background: rgba(0,229,255,0.03); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        .nav-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* TAB PANES */
        .tab-pane { display: none; padding: 20px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CATEGORIZED LIBRARIAN v22 */
        .librarian-section { margin-top: 15px; }
        .lib-category { margin-bottom: 15px; }
        .lib-cat-title { font-size: 10px; font-weight: 900; color: #888; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        .lib-link-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }
        .lib-link-info { flex: 1; }
        .lib-link-name { display: block; font-size: 12px; font-weight: 900; color: var(--electric-blue); }
        .lib-link-meta { display: block; font-size: 9px; color: #666; margin-top: 2px; }

        /* PHOTO STAGING SLIDER v22 */
        .photo-staging-area { margin: 15px 0; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; border: 1px solid rgba(0, 229, 255, 0.1); }
        .photo-slider { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .photo-card { position: relative; flex: 0 0 140px; height: 180px; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .photo-actions { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: space-around; padding: 8px 0; }
        .btn-mini-action { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }

        /* FULL VIEWER */
        .full-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: none; flex-direction: column; }
        .viewer-header { padding: 25px; display: flex; justify-content: flex-end; }
        .viewer-img { flex: 1; display: flex; align-items: center; justify-content: center; }
        .viewer-img img { max-width: 100%; max-height: 90%; object-fit: contain; }

        /* MODAL (AI TAG RESULTS) v22 */
        .ai-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 15000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .ai-box { background: var(--bg-dark); border: 2px solid var(--electric-blue); border-radius: 24px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,1); }
        .ai-results-grid { margin: 15px 0; background: rgba(255,255,255,0.03); border-radius: 16px; padding: 15px; max-height: 300px; overflow-y: auto; }
        .ai-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .folder-select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; width: 100%; margin: 10px 0; font-size: 14px; appearance: none; }
    </style>
</head>
<body id="masterBody">
    <!-- TOP HEADER -->
    <header class="header">
        <h1 id="mainTitle">HVAC Master <span style="color:var(--emerald-green);">Pro</span></h1>
        <div style="display:flex; justify-content:space-between; width:100%; padding:0 20px; box-sizing:border-box;">
            <span id="jobStatus" style="font-size:10px; font-weight:900; color:#666;">NO ACTIVE JOB</span>
            <span id="stagedCount" style="font-size:10px; font-weight:900; color:var(--amber-orange);"></span>
        </div>
    </header>

    <!-- TAB CONTENTS -->
    <div id="tab-jobs" class="tab-pane active">
        <div class="active-job-container">
            <h2 id="displayJobName" style="margin-top:0;">READY FOR NEW CALL</h2>
            <div id="jobDetails" style="font-size:12px; color:#888; margin-bottom:15px;">Setup your job shell below.</div>
            <input type="text" id="custName" placeholder="Client Name / Address">
            <button class="btn btn-accent" onclick="startNewJob()" style="margin-top:10px;">CREATE JOB SHELL</button>
            <div id="restoreBox" style="display:none; margin-top:15px;">
                <button class="btn btn-outline" onclick="restoreJob()">RESTORE CACHE</button>
            </div>
        </div>
    </div>

    <div id="tab-scan" class="tab-pane">
        <div id="photoStagingArea" class="photo-staging-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size:10px; font-weight:900; color:var(--electric-blue);">STAGED PHOTOS</span>
                <button onclick="scanAllPhotos()" style="font-size:10px; font-weight:900; background:none; border:none; color:var(--amber-orange); text-decoration:underline;">⚡ ANALYZE ALL</button>
            </div>
            <div id="photoSlider" class="photo-slider"></div>
            <button onclick="document.getElementById('fileInput').click()" class="btn btn-outline" style="margin-top:10px; font-size:12px; padding:10px;">📷 ADD TAG PHOTOS</button>
            <input type="file" id="fileInput" style="display:none;" accept="image/*" multiple onchange="handleMultiPhotos(this)">
        </div>

        <div class="active-job-container" style="text-align:center; padding:40px 20px;">
            <div id="micStatus" style="font-size:10px; font-weight:900; color:var(--amber-orange); margin-bottom:10px;">DICTATE RLA / FLA / SUB</div>
            <button id="micBtn" class="mic-btn" onclick="toggleMic()">🎙️</button>
            <div id="transcript" style="margin-top:15px; font-size:14px; color:#888; font-style:italic; min-height:20px;"></div>
        </div>
    </div>

    <div id="tab-diag" class="tab-pane">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
            <button class="btn btn-outline" onclick="setField('Herm Volts')">HERM VOLTS</button>
            <button class="btn btn-outline" onclick="setField('Fan Volts')">FAN VOLTS</button>
            <button class="btn btn-outline" onclick="setField('Herm Amps')">HERM AMPS</button>
            <button class="btn btn-outline" onclick="setField('Fan Amps')">FAN AMPS</button>
            <button class="btn btn-outline" onclick="setField('Capacitor MFD')" style="grid-column: span 2;">CAPACITOR</button>
        </div>
        <button class="btn btn-accent" onclick="toggleMasterMic()" id="masterMicBtn">🎙️ AUTO LOGGING</button>
        <div id="logList" style="margin-top:20px;"></div>
    </div>

    <div id="tab-report" class="tab-pane">
        <div id="reportContent">
            <!-- Specs & Librarian Go Here -->
        </div>
        <div style="margin-top:20px; border-top:1px solid #222; padding-top:20px;">
            <label style="font-size:10px; font-weight:900; color:#666;">SYNC TO DRIVE FOLDER:</label>
            <select id="folderSelect" class="folder-select">
                <option value="">-- Use Active Job Folder --</option>
            </select>
            <button class="btn btn-accent" onclick="sendFinalBlock()" style="background:var(--emerald-green); color:black; margin-top:15px; padding:20px; font-size:20px; width:100%;">SEAL & SYNC REPORT</button>
        </div>
        <div id="manualLinks" style="margin-top:20px;"></div>
    </div>

    <!-- BOTTOM NAVBAR -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-jobs" onclick="switchTab('jobs')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Jobs</span>
        </div>
        <div class="nav-item" id="nav-scan" onclick="switchTab('scan')">
            <span class="nav-icon">📸</span>
            <span class="nav-label">Scan</span>
        </div>
        <div class="nav-item" id="nav-diag" onclick="switchTab('diag')">
            <span class="nav-icon">⚡</span>
            <span class="nav-label">Diag</span>
        </div>
        <div class="nav-item" id="nav-report" onclick="switchTab('report')">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Report</span>
        </div>
    </nav>

    <!-- AI TAG RESULTS MODAL -->
    <div id="aiModal" class="ai-modal">
        <div class="ai-box">
            <h3 style="margin-top:0; color:var(--electric-blue); font-size:16px;">AI TAG RESULTS</h3>
            <div id="aiResults" class="ai-results-grid"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn btn-accent" onclick="confirmAiSpecs()">STAGE</button>
                <button class="btn btn-outline" onclick="closeAiModal()">DISCARD</button>
            </div>
        </div>
    </div>

    <!-- FULL PHOTO VIEWER -->
    <div id="fullViewer" class="full-viewer" onclick="closeFullView()">
        <div class="viewer-header"><button>&times;</button></div>
        <div class="viewer-img"><img id="viewerImg" src=""></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlH-ta2DPWcVES8Kj49jbD3tWpbqdPm4Of0CAsvD6m1ZlVFhhAH0Fij33mwBP_wv2z/exec";

        let buffer = JSON.parse(localStorage.getItem('hvacStagingBufferV20')) || [];
        let specs = JSON.parse(localStorage.getItem('hvacSpecsV20')) || { RLA: 0, FLA: 0, SUB: 0, Model: "", Serial: "" };
        let stagedPhotos = JSON.parse(localStorage.getItem('hvacPhotosV21')) || [];
        let currentTab = localStorage.getItem('hvacTabV22') || 'jobs';
        let tempAiSpecs = {}; 
        let isMicOn = false; let recognition = null; let field = "RLA";

        // INIT UI
        window.onload = () => { switchTab(currentTab); syncLogToUI(); renderPhotoSlider(); };

        // TAB SYSTEM
        function switchTab(tabId) {
            currentTab = tabId;
            localStorage.setItem('hvacTabV22', tabId);
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
            
            if(tabId === 'report') { runLibrarianInApp(); fetchFolders(); }
            stopMic(); // Clean up mic on tab change
        }

        // PHOTO HANDLER
        function handleMultiPhotos(input) {
            const files = input.files; if (files.length === 0) return;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    stagedPhotos.push({ data: e.target.result.split(',')[1], filename: files[i].name, mimeType: files[i].type, scanned: false });
                    savePhotos(); renderPhotoSlider();
                };
                reader.readAsDataURL(files[i]);
            }
        }
        function savePhotos() { localStorage.setItem('hvacPhotosV21', JSON.stringify(stagedPhotos)); }
        function renderPhotoSlider() {
            const slider = document.getElementById('photoSlider');
            slider.innerHTML = stagedPhotos.map((p, idx) => `
                <div class="photo-card" onclick="openFullView('${p.data}', '${p.mimeType}')">
                    <img src="data:${p.mimeType};base64,${p.data}">
                    ${p.scanned ? '<div style="position:absolute;top:5px;right:5px;background:var(--emerald-green);font-size:8px;padding:2px 5px;border-radius:4px;color:black;font-weight:900;">SCANNED</div>' : ''}
                    <div class="photo-actions" onclick="event.stopPropagation()">
                        <button class="btn-mini-action" onclick="scanSpecificPhoto(${idx})" style="color:var(--electric-blue);">🔍</button>
                        <button class="btn-mini-action" onclick="deleteStagedPhoto(${idx})" style="color:#ff1744;">🗑️</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('stagedCount').innerText = `${stagedPhotos.length + buffer.length + Object.keys(specs).filter(k=>specs[k]).length} ITEMS`;
        }
        function deleteStagedPhoto(idx) { stagedPhotos.splice(idx, 1); savePhotos(); renderPhotoSlider(); }
        async function scanSpecificPhoto(idx) {
            const p = stagedPhotos[idx];
            document.getElementById('mainTitle').innerText = "AI SCANNING...";
            try {
                const r = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "uploadPhotoAI", data: p.data, filename: p.filename, mimeType: p.mimeType }) });
                const res = await r.json();
                if(res && res.extractedData) { tempAiSpecs = res.extractedData; p.scanned = true; savePhotos(); renderPhotoSlider(); openAiModal(res.extractedData); }
            } catch (e) { alert("AI Error"); }
            document.getElementById('mainTitle').innerHTML = 'HVAC Master <span style="color:var(--emerald-green);">Pro</span>';
        }
        async function scanAllPhotos() { for (let i = 0; i < stagedPhotos.length; i++) { if (!stagedPhotos[i].scanned) await scanSpecificPhoto(i); } }
        function openFullView(b64, mime) { document.getElementById('viewerImg').src = `data:${mime};base64,${b64}`; document.getElementById('fullViewer').style.display = 'flex'; }
        function closeFullView() { document.getElementById('fullViewer').style.display = 'none'; }

        // AI MODAL
        function openAiModal(data) {
            document.getElementById('aiModal').style.display = 'flex';
            document.getElementById('aiResults').innerHTML = Object.entries(data).map(([k, v]) => `
                <div class="ai-row"><span>${k}</span><span style="color:var(--electric-blue); font-weight:900;">${v}</span></div>
            `).join('');
        }
        function closeAiModal() { document.getElementById('aiModal').style.display = 'none'; }
        function confirmAiSpecs() {
            if(tempAiSpecs.RLA) specs.RLA = tempAiSpecs.RLA; if(tempAiSpecs.FLA) specs.FLA = tempAiSpecs.FLA; if(tempAiSpecs.TargetSC) specs.SUB = tempAiSpecs.TargetSC;
            if(tempAiSpecs.Model) specs.Model = tempAiSpecs.Model; if(tempAiSpecs.Serial) specs.Serial = tempAiSpecs.Serial;
            localStorage.setItem('hvacSpecsV20', JSON.stringify(specs)); syncLogToUI(); closeAiModal();
        }

        // MIC LOGIC
        function toggleMic() { if(isMicOn) stopMic(); else startMic(); }
        function startMic() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
            if(!SR) return alert("Mic not supported.");
            recognition = new SR(); recognition.continuous = true; recognition.interimResults = true;
            recognition.onstart = () => { isMicOn = true; document.getElementById('micBtn').classList.add('recording-pulse'); document.getElementById('micStatus').innerText = "LISTENING..."; };
            recognition.onresult = (e) => {
                let t = e.results[e.results.length-1][0].transcript.toLowerCase();
                document.getElementById('transcript').innerText = t;
                let target = t.includes("rla") ? "RLA" : t.includes("fla") ? "FLA" : t.includes("sub") ? "SUB" : null;
                if(target) field = target;
                let num = t.replace(/[^0-9.]/g, '');
                if(num && field) { 
                    specs[field] = parseFloat(num); 
                    localStorage.setItem('hvacSpecsV20', JSON.stringify(specs));
                    document.getElementById('micStatus').innerText = `STAGED ${field}: ${num}`;
                    syncLogToUI();
                }
            };
            recognition.onend = () => { if(isMicOn) recognition.start(); }; recognition.start();
        }
        function stopMic() { isMicOn = false; if(recognition) { recognition.onend = null; recognition.stop(); } document.getElementById('micBtn').classList.remove('recording-pulse'); document.getElementById('micStatus').innerText = "TAP TO DICTATE"; }

        // DIAG LOGIC
        function setField(f) { field = f; alert(`Recording ${f}...`); }
        function toggleMasterMic() { alert("Diagnostics Auto-Mode Active"); } // Placeholder for existing complex logic

        // REPORT & LIBRARIAN
        function syncLogToUI() {
            const container = document.getElementById('reportContent');
            let html = `<div style="margin-bottom:20px;">
                <h3 class="lib-cat-title">UNIT SPECS</h3>
                ${['Model', 'Serial', 'RLA', 'FLA', 'SUB'].map(k => specs[k] ? `
                    <div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:5px;">
                        <span>${k}: <b>${specs[k]}</b></span>
                        <button onclick="deleteSpec('${k}')" style="color:#ff1744; background:none; border:none; font-size:10px;">REMOVE</button>
                    </div>
                ` : '').join('')}
            </div>`;

            if(buffer.length > 0) {
                html += `<div><h3 class="lib-cat-title">DIAGNOSTIC LOG</h3>
                ${buffer.map((i, idx) => `<div style="padding:10px; border-bottom:1px solid #222; font-size:12px;">${i.field}: ${i.val} <button onclick="buffer.splice(${idx},1);syncLogToUI();" style="float:right;">&times;</button></div>`).join('')}
                </div>`;
            }
            container.innerHTML = html;
        }
        function deleteSpec(k) { specs[k] = ""; localStorage.setItem('hvacSpecsV20', JSON.stringify(specs)); syncLogToUI(); }

        async function runLibrarianInApp() {
            const linksDiv = document.getElementById('manualLinks');
            linksDiv.innerHTML = '<div style="color:var(--amber-orange); text-align:center; padding:20px; font-size:12px;">SEARCHING LIBRARY...</div>';
            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "runPipeline" }), mode: "no-cors" });
                const r = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "fetchManuals" }) });
                const equipment = await r.json();
                
                if(!equipment || equipment.length === 0) { linksDiv.innerHTML = '<div style="color:#444; text-align:center;">No manuals found.</div>'; return; }
                
                let html = '<h3 class="lib-cat-title">LIBRARIAN (MANUALS)</h3>';
                equipment.forEach(e => {
                    const categories = { "Installation": [], "Service": [], "Specs": [], "Other": [] };
                    e.links.forEach(l => {
                        if(l.text.includes("Install")) categories.Installation.push(l);
                        else if(l.text.includes("Service") || l.text.includes("Maintenance")) categories.Service.push(l);
                        else if(l.text.includes("Spec") || l.text.includes("Data")) categories.Specs.push(l);
                        else categories.Other.push(l);
                    });

                    Object.entries(categories).forEach(([name, links]) => {
                        if(links.length === 0) return;
                        html += `<div class="lib-category"><div class="lib-cat-title" style="border:none; color:var(--emerald-green);">${name}</div>`;
                        links.forEach(l => {
                            html += `<a href="${l.url}" target="_blank" class="lib-link-card">
                                <div class="lib-link-info"><span class="lib-link-name">${l.text}</span><span class="lib-link-meta">REV: 2024 / PDF</span></div>
                                <span style="font-size:20px;">📄</span>
                            </a>`;
                        });
                        html += `</div>`;
                    });
                });
                linksDiv.innerHTML = html;
            } catch (e) { linksDiv.innerHTML = '<div style="color:red; text-align:center;">Library Search Failed.</div>'; }
        }

        function startNewJob() { 
            const name = document.getElementById('custName').value; 
            if(!name) return alert("Enter Customer Name");
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "createJob", name: name, date: new Date().toISOString().split('T')[0] }), mode: "no-cors" })
            .then(() => { 
                localStorage.removeItem('hvacPhotosV21'); 
                localStorage.removeItem('hvacStagingBufferV20');
                localStorage.removeItem('hvacSpecsV20');
                location.reload(); 
            }); 
        }

        async function fetchFolders() {
            const select = document.getElementById('folderSelect');
            select.innerHTML = '<option value="">-- LOADING FOLDERS --</option>';
            try {
                const r = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "fetchFolders" }) });
                const folders = await r.json();
                select.innerHTML = '<option value="">-- Use Active Job Folder --</option>' + 
                    folders.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
            } catch (e) { select.innerHTML = '<option value="">-- DIR ERROR --</option>'; }
        }

        function sendFinalBlock() {
            const btn = event.target;
            btn.innerText = "SYNCING REPORT...";
            btn.disabled = true;

            const payload = [];
            if(specs.Model) payload.push(`Model ◘ ${specs.Model}`);
            if(specs.Serial) payload.push(`Serial ◘ ${specs.Serial}`);
            if(specs.RLA) payload.push(`RLA (Measured) ◘ ${specs.RLA}`);
            if(specs.FLA) payload.push(`Fan FLA ◘ ${specs.FLA}`);
            if(specs.SUB) payload.push(`Target SC ◘ ${specs.SUB}`);
            buffer.forEach(b => payload.push(`${b.field} ◘ ${b.val}`));

            const folderId = document.getElementById('folderSelect').value;
            const photoList = stagedPhotos.filter(p => !p.scanned || true); // Send all for now

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "syncVoice",
                    payload: payload.join(" | "),
                    photos: stagedPhotos,
                    folderId: folderId
                }),
                mode: "no-cors"
            }).then(() => {
                alert("REPORT SEALED!");
                localStorage.removeItem('hvacStagingBufferV20');
                localStorage.removeItem('hvacPhotosV21');
                location.reload();
            });
        }
    </script>
</body>
